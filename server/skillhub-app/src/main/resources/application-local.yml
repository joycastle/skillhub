spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/skillhub
    username: skillhub
    password: skillhub_dev
  data:
    redis:
      host: localhost
      port: 6379
  session:
    store-type: redis
  security:
    oauth2:
      client:
        registration:
          feishu:
            client-id: ${OAUTH2_FEISHU_CLIENT_ID:local-placeholder}
            client-secret: ${OAUTH2_FEISHU_CLIENT_SECRET:local-placeholder}
            redirect-uri: "${SKILLHUB_WEB_BASE_URL:http://localhost:3000}/login/oauth2/code/{registrationId}"

skillhub:
  auth:
    api-tokens:
      enabled: false
    mock:
      enabled: true
    web-base-url: ${SKILLHUB_WEB_BASE_URL:http://localhost:3000}
  publish:
    auto-publish: true
    max-single-file-size: 52428800 # 50MB for local OpenClaw-style bundles
  governance:
    enabled: false
  profile:
    moderation:
      machine-review: false
      human-review: false
  ratelimit:
    download:
      anonymous-cookie-secret: ${SKILLHUB_DOWNLOAD_ANON_COOKIE_SECRET:local-dev-download-secret-32-bytes}
  notification:
    cleanup:
      read-retention-days: 30
      unread-retention-days: 90
  security:
    scanner:
      enabled: ${SKILLHUB_SECURITY_SCANNER_ENABLED:true}
      base-url: ${SKILLHUB_SECURITY_SCANNER_URL:http://localhost:8000}
      mode: ${SKILLHUB_SECURITY_SCANNER_MODE:upload}
    stream:
      reclaim-enabled: ${SKILLHUB_SCAN_STREAM_RECLAIM_ENABLED:true}
      reclaim-min-idle: ${SKILLHUB_SCAN_STREAM_RECLAIM_MIN_IDLE:PT2M}
      reclaim-batch-size: ${SKILLHUB_SCAN_STREAM_RECLAIM_BATCH_SIZE:20}
      reclaim-interval: ${SKILLHUB_SCAN_STREAM_RECLAIM_INTERVAL:PT30S}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}

logging:
  level:
    com.iflytek.skillhub: INFO
    org.springframework.security: WARN
